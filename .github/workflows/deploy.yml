name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      # Write .env.prod from the GitHub secret so Cloud Build can read it
      # via --env-vars-file. The file is never committed to the repo.
      - name: Write .env.prod
        run: echo "${{ secrets.ENV_PROD }}" > .env.prod

      - name: Submit Cloud Build
        run: |
          gcloud builds submit --config cloudbuild.yaml . \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --substitutions="_CACHE_BUCKET=${{ secrets.GCP_CACHE_BUCKET }},COMMIT_SHA=${{ github.sha }}"
